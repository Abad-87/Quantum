# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Render deployment configuration for Quantum – Unbiased AI Decision Platform
#
# How to use:
#   1. Push this repo to GitHub
#   2. Connect GitHub repo to Render (render.com → New → Web Service)
#   3. Render auto-detects this file and configures the service
#   4. Add environment variables in the Render dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: quantum-ai-backend
    runtime: python
    region: oregon          # Free tier available in: oregon, frankfurt
    plan: free              # Use "starter" for paid, always-on service

    # ── Build ────────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements.txt

    # ── Start ────────────────────────────────────────────────────────────────
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # ── Health check (Render pings this to confirm the service is alive) ─────
    healthCheckPath: /health

    # ── Environment variables ────────────────────────────────────────────────
    # Set these in the Render dashboard → Environment tab
    # Do NOT hardcode secrets here!
    envVars:
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

    # ── Auto-deploy on git push ───────────────────────────────────────────────
    autoDeploy: true
